<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cyber Watch Suite Login</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#171614;--surface:#1c1b19;--surface2:#201f1d;--border:#393836;--text:#e7e5e1;--muted:#b0ada7;--primary:#4f98a3;--primary2:#67aab4;--radius:1rem}
    *{box-sizing:border-box} body{margin:0;min-height:100dvh;display:grid;place-items:center;background:linear-gradient(180deg,#171614,#111);font-family:'Satoshi',sans-serif;color:var(--text)}
    .card{width:min(440px,92vw);padding:2rem;background:linear-gradient(180deg,var(--surface),var(--surface2));border:1px solid var(--border);border-radius:var(--radius)}
    h1{margin:0 0 .4rem 0} p{color:var(--muted)} input,button{font:inherit} input{width:100%;min-height:46px;padding:.8rem .95rem;border-radius:.8rem;border:1px solid var(--border);background:#252320;color:var(--text);margin:.6rem 0 1rem} button{width:100%;min-height:46px;border:none;border-radius:.8rem;background:var(--primary);color:#111;font-weight:700;cursor:pointer} button:hover{background:var(--primary2)} .tiny{font-size:.85rem;color:var(--muted)} code{background:#252320;padding:.15rem .4rem;border-radius:.35rem}
  </style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <h1>Cyber Watch Suite</h1>
    <p>Internal threat dashboard login.</p>
    <label>Username</label>
    <input type="text" name="username" required />
    <label>Password</label>
    <input type="password" name="password" required />
    <button type="submit">Sign in</button>
    <p class="tiny">Default admin login: <code>admin</code> / <code>ChangeMe123!</code>. Change it immediately after deployment.</p>
  </form>
</body>
</html>
